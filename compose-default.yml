version: '3'
services:
  worker:
    image: valgul/kasuki:latest
    command: --worker
    container_name: kasuki-worker
    restart: unless-stopped
    depends_on:
      - db
    tty: true
    volumes:
      - ./logs/:/kasuki/logs/
      - ./config.toml:/kasuki/config.toml
      - /etc/localtime:/etc/localtime:ro
    networks:
      kasuki:

  api-server:
    image: valgul/kasuki:latest
    command: --api
    restart: unless-stopped
    depends_on:
      - db
    tty: true
    volumes:
      - ./logs/:/kasuki/logs/
      - ./config.toml:/kasuki/config.toml
      - /etc/localtime:/etc/localtime:ro
    networks:
      kasuki:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1

  image-generation:
    image: valgul/kasuki:latest
    command: --image-generation
    container_name: kasuki-image-generation
    restart: unless-stopped
    depends_on:
      - db
      - redis
    tty: true
    volumes:
      - ./logs/:/kasuki/logs/
      - ./config.toml:/kasuki/config.toml
      - ./images:/kasuki/images
      - /etc/localtime:/etc/localtime:ro
    networks:
      kasuki:

  bot:
    image: valgul/kasuki:latest
    command: --bot
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - worker
      - lavalink
    tty: true
    volumes:
      - ./db/:/kasuki/db
      - ./logs/:/kasuki/logs/
      - ./server_image:/kasuki/server_image/
      - ./cert:/kasuki/cert/
      - ./new_member_image:/kasuki/new_member_image
      - ./config.toml:/kasuki/config.toml
      - ./images:/kasuki/images
      - /etc/localtime:/etc/localtime:ro
    networks:
      kasuki:
    deploy:
      replicas: 1

  db:
    image: postgres
    restart: always
    hostname: db
    volumes:
      - ./db/:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=example
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      kasuki:
        ipv4_address: 172.65.0.3
    ports:
      - "10001:5432"

  redis:
    image: redis:7-alpine
    container_name: kasuki-redis
    restart: always
    hostname: redis
    # Uncomment and set a password to enable Redis auth:
    # command: redis-server --requirepass YOUR_PASSWORD_HERE
    networks:
      kasuki:
    volumes:
      - ./redis-data:/data

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun-kasuki
    hostname: gluetun-kasuki
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      FIREWALL_INPUT_PORTS: 8080,6881,43211,5432,2333
      VPN_SERVICE_PROVIDER: # https://github.com/qdm12/gluetun-wiki/tree/main/setup/providers
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: CHANGE_ME_TO_YOUR_PRIVATE_KEY
      SERVER_COUNTRIES: Germany
      PORT_FORWARD_ONLY: true
    networks:
      - kasuki

  lavalink:
    # pin the image version to Lavalink v4
    image: ghcr.io/lavalink-devs/lavalink
    user: "0"
    container_name: lavalink
    restart: always
    depends_on:
      - gluetun
    environment:
      # set Java options here
      - _JAVA_OPTIONS=-Xmx6G
      # set lavalink server port
      - SERVER_PORT=2333
      # set password for lavalink
      - LAVALINK_SERVER_PASSWORD=CHANGE_ME_TO_A_STRONG_PASSWORD
    volumes:
      # mount application.yml from the same directory or use environment variables
      - /docker/app/kasuki/application.yml:/opt/Lavalink/application.yml
      # persist plugins between restarts, make sure to set the correct permissions (user: 322, group: 322)
      - /docker/app/kasuki/plugins/:/opt/Lavalink/plugins/
    network_mode: "service:gluetun"

networks:
  kasuki:
    driver: bridge
    ipam:
      config:
        - subnet: 172.65.0.0/24
