name: Build & Publish Dev Docker Images

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: "dev_docker"
  # Queue rather than cancel — builds are expensive and we want each push deployed
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ${{ matrix.os }}
    # Each arch builds on a native runner (not QEMU) for faster compilation
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Increase kernel limits needed by the Rust linker/compiler for large builds
      - name: Configure system
        run: |
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w fs.file-max=262144

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: bot
          file: bot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          # Disable provenance attestation to avoid multi-platform manifest issues
          provenance: false

  manifest:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Combine per-arch images into a single multi-arch tag so `docker pull` auto-selects
      - name: Create and push manifest list
        run: |
          docker manifest create ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev \
            --amend ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-amd64 \
            --amend ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-arm64
          docker manifest push ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev
