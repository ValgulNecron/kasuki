name: Build & Publish Dev Docker Images

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: "dev_docker"
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure system
        run: |
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w fs.file-max=262144

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push (single-arch, output digest)
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: bot
          file: bot/Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Save image digest
        run: echo "${{ steps.docker_build.outputs.digest }}" > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: digest.txt

  manifest:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*

      - name: Read digests into environment
        run: |
          AMD64_DIGEST=$(cat digest-amd64/digest.txt)
          ARM64_DIGEST=$(cat digest-arm64/digest.txt)
          echo "AMD64_DIGEST=$AMD64_DIGEST" >> $GITHUB_ENV
          echo "ARM64_DIGEST=$ARM64_DIGEST" >> $GITHUB_ENV

      - name: Create and push manifest with digests
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev \
            ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-amd64@${{ env.AMD64_DIGEST }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:dev-arm64@${{ env.ARM64_DIGEST }}
