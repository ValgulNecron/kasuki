name: Build & Publish Release Docker Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "master_docker"
  # Queue rather than cancel — release builds must all complete
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ${{ matrix.os }}
    # Each arch builds on a native runner (not QEMU) for faster compilation
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Increase kernel limits needed by the Rust linker/compiler for large builds
      - name: Configure system
        run: |
          sudo sysctl -w vm.max_map_count=262144
          sudo sysctl -w fs.file-max=262144

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: bot
          file: bot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:latest-${{ matrix.arch }}

  manifest:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Combine per-arch images into a single multi-arch tag so `docker pull` auto-selects
      - name: Create and push manifest list
        run: |
          docker manifest create ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:latest \
            --amend ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:latest-amd64 \
            --amend ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:latest-arm64
          docker manifest push ${{ secrets.DOCKER_HUB_USERNAME }}/kasuki:latest
